name: Build and Deploy URI Gateway API to Azure VM (PROD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: Run tests
      # - name: Run tests
      #   run: pytest

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t uriteam/urisvc:urigatewayapiprod .
          docker push uriteam/urisvc:urigatewayapiprod

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Checkout the code to access docker-compose.yml
      - uses: actions/checkout@v4

      # Copy source files and docker-compose to VM
      - name: Copy source files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP_PROD }}
          username: urisocialprod
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          source: "./app/,./docker-compose.prod.yml,./.env.production.example,./Dockerfile,./requirements.txt"
          target: "~/uri-gateway-backend/"
          strip_components: 0
          rm: false

      # SSH into the VM and deploy the Docker container
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_IP_PROD }}
          username: urisocialprod
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          script: |
            if [ ! -d ~/uri-gateway-backend ]; then
              mkdir -p ~/uri-gateway-backend;
            fi
            cd ~/uri-gateway-backend

            # Create .env.production from secrets if it doesn't exist
            if [ ! -f .env.production ]; then
              echo "Creating .env.production from uri-social-gateway-backend..."
              if [ -f ~/uri-social-gateway-backend/.env.production ]; then
                cp ~/uri-social-gateway-backend/.env.production .env.production
              else
                echo ".env.production not found in either location - container may fail!"
              fi
            fi

            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

            # Pull latest image
            docker pull uriteam/urisvc:urigatewayapiprod

            # Deploy container (will restart uri-gateway.api.prod)
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            # Cleanup redundant images
            docker image prune -f

            # Verify container is running
            docker ps | grep uri-gateway.api.prod
